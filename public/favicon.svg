<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .bg { fill: #111111; }
    .text { font-family: system-ui, sans-serif; font-weight: 800; font-size: 42px; fill: #ffffff; }
    .dot { fill: #3b82f6; } /* Matches your accent-primary color (e.g. Tailwind Blue) */

    @media (prefers-color-scheme: dark) {
      /* Optional: tweaks if the user's browser is in dark mode */
    }
  </style>
  
  <!-- Rounded dark background square -->
  <rect width="100" height="100" rx="24" class="bg" />
  
  <!-- Centered Initials "YS." -->
  <text x="50" y="58" dominant-baseline="middle" text-anchor="middle" class="text">
    YS<tspan class="dot">.</tspan>
  </text>
</svg>
